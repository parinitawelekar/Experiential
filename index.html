<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Registration</title>
    
        <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
     
<div class="container">
    <div class="header">
        
        <h1>WORKSHOP REGISTRATION</h1>
        <h3>Final Step to Join the Event</h3>
       
    </div>
    
    <div class="content">
 <form id="regForm">
            <br>
            <fieldset>
                <legend>1. Participant Details</legend>
                <div class="row">
                    <div>
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="user_name" placeholder="Write name" required>
                    </div>
                    <div>
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="user_email" placeholder="pari@example.com" required>
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 00000 00000">
                    </div>
                    <div>
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="Mumbai">
                    </div>
                </div>
            </fieldset>
                <br>
    <fieldset>
                <legend>2. Select Workshop Track</legend>
                <div class="radio-group">
                    <label><input type="radio" name="track" value="web" required> Web Development</label>
                    <label><input type="radio" name="track" value="ds"> Data Science</label>
                    <label><input type="radio" name="track" value="ai"> Artificial Intelligence</label>
                    <label><input type="radio" name="track" value="cyber"> Cyber Security</label>
                </div>
            </fieldset>
            <br>
            <fieldset>
    <legend>3. Payment Method</legend>

    
    <div class="tabs">
        <button type="button" class="tab-btn active" onclick="showTab('card', this)">
            Credit Card
        </button>

        <button type="button" class="tab-btn" onclick="showTab('bank', this)">
            Net Banking
        </button>

        <button type="button" class="tab-btn" onclick="showTab('upi', this)">
            UPI
        </button>
    </div>

    <!-- Credit Card -->
    <div id="card" class="tab-content active">
        <label>Card Number</label>
        <input type="text" placeholder="1234 5678 9012 3456">

        <div class="row">
            <div>
                <label>Expiry</label>
                <input type="text" placeholder="MM/YY">
            </div>
<br>
            <div>
                <label>CVV</label>
                <input type="password" placeholder="123">
            </div>
        </div>

        <label>Name on Card</label>
        <input type="text" placeholder="Cardholder Name">
    </div>

    <!-- Net Banking -->
    <div id="bank" class="tab-content">
        <label>Select Bank</label>
        <select>
            <option>Choose Bank</option>
            <option>HDFC Bank</option>
            <option>ICICI Bank</option>
            <option>SBI</option>
            <option>Axis Bank</option>
        </select>

        <label>Account Holder Name</label>
        <input type="text" placeholder="Enter Name">
    </div>

    <!-- UPI -->
    <div id="upi" class="tab-content">
        <label>UPI ID</label>
        <input type="text" placeholder="example@upi">
    </div>
            </fieldset>
            <br>
             <div class="actions">
               <button type="submit" onclick="showPopup()">
    Complete Registration • ₹599
</button>
                <button class="btn secondary" type="reset">Clear Form</button>
            </div>
        </form>
    </div>
</div>
    <footer>
    <strong>Workshop Registration Portal</strong><br>
    Email: support@workshop.com | Phone: +91 98765 43210<br>
    &copy; 2026 All Rights Reserved
</footer>
    <button onclick="showPopup()">Complete Registration • ₹599</button>

<div id="popup" class="popup">
    <div class="popup-box">
        <h2>🎉 Registration Done!</h2>
        <button onclick="closePopup()">OK</button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
