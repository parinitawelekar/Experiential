<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Registration</title>
    
        <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        
        <h1>WORKSHOP REGISTRATION</h1>
        <h3>Final Step to Join the Event</h3>
    </div>
    <img class="banner" src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1000&q=80" alt="Team collaborating on laptops" width="500" height="500">

    <div class="content">
       <form action="/submit_registration" method="POST"> 
            <br>
            <fieldset>
                <legend>1. Participant Details</legend>
                <div class="row">
                    <div>
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="user_name" placeholder="Write name" required>
                    </div>
                    <div>
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="user_email" placeholder="pari@example.com" required>
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 00000 00000">
                    </div>
                    <div>
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="Mumbai">
                    </div>
                </div>
            </fieldset>
                <br>
            <fieldset>
                <legend>2. Select Workshop Track</legend>
                <div class="radio-group">
                    <label><input type="radio" name="track" value="web" required> Web Development</label>
                    <label><input type="radio" name="track" value="ds"> Data Science</label>
                    <label><input type="radio" name="track" value="ai"> Artificial Intelligence</label>
                    <label><input type="radio" name="track" value="cyber"> Cyber Security</label>
                </div>
            </fieldset>
            <br>
            <fieldset>
                <legend>3. Payment Method</legend>
                <div class="paybox">
                    <p style="margin-top:0"><strong>Credit / Debit Card</strong></p>
                    <div style="margin-bottom:15px">
                        <label for="card">Card Number</label>
                        <input type="number" id="card" placeholder="0000 0000 0000 0000">
                    </div>
                    <div class="row">
                        <div>
                            <label for="expiry">Expiry (MM/YY)</label>
                            <input type="text" id="expiry" placeholder="12/28">
                        </div>
                        <div>
                            <label for="cvv">CVV</label>
                            <input type="password" id="cvv" placeholder="***">
                        </div>
                    </div>
                    <hr style="border:0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
                    <label for="bank">Net Banking</label>
                    <select id="bank">
                        <option value="">Choose a Bank</option>
                        <option>Global Bank Corp</option>
                        <option>National Heritage Bank</option>
                        <option>Digital Trust Union</option>
                    </select>
                </div>
            </fieldset>
            <br>
             <div class="actions">
                <button class="btn primary" type="submit">Complete Registration • ₹599</button>
                <button class="btn secondary" type="reset">Clear Form</button>
            </div>
        </form>
    </div>
</div>
    <footer>
    <strong>Workshop Registration Portal</strong><br>
    Email: support@workshop.com | Phone: +91 98765 43210<br>
    &copy; 2026 All Rights Reserved
</footer>
</body>
</html>
